<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ezconf — login</title>
<link rel="stylesheet" href="theme-%%EZCONF_THEME%%.css">
<link rel="stylesheet" href="style.css">
<style>
  body { align-items: center; justify-content: center; overflow: auto; }
  .login-card {
    background: var(--bg2); border: 1px solid var(--border2); border-radius: 10px;
    padding: 40px 36px; width: 100%; max-width: 360px;
  }
  .login-card h1 { font-size: 18px; font-weight: 700; margin-bottom: 28px; color: var(--accent); letter-spacing: .04em; }
  .login-card label { display: block; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
  .login-card input, .login-card select { display: block; margin-bottom: 16px; padding: 7px 10px; }
  .login-card .btn { width: 100%; justify-content: center; margin-top: 4px; }
  .login-error { color: var(--red); font-size: 12px; margin-top: 14px; min-height: 18px; text-align: center; }
</style>
</head>
<body>
<div class="login-card">
  <h1>ezconf</h1>
  <form method="post" action="/login">
    <label for="u">Username</label>
    %%EZCONF_USERNAME_FIELD%%
    <label for="p">Password</label>
    <input id="p" name="password" type="password" autocomplete="current-password" autofocus>
    <button type="submit" class="btn primary">Sign in</button>
  </form>
  <div class="login-error">%%EZCONF_ERROR%%</div>
</div>
</body>
</html>
